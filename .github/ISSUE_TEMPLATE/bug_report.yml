name: Bug Report
description: Report a bug or unexpected behavior in Rylox.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

        Please provide as much information as possible so we can reproduce and investigate the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows / Linux / macOS

  - type: textarea
    id: logs
    attributes:
      label: Additional context
      description: Paste stack traces, logs, screenshots, or any other useful information.