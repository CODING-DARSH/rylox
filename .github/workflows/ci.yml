name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable, with dev deps)
        run: pip install -e ".[dev]"
         - name: Show Ruff version
        run: |
          ruff --version
          python -m pip show ruff
          
      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src

      - name: Unit + regression + integration tests (pytest)
        run: pytest -v --cov=rylox --cov-report=term-missing
